# Cấu hình đóng gói InsightVault (v0.1 pre-release). CHƯA code-sign/notarize/auto-update (pha sau — cần
# Apple Developer ID + Windows cert). Native module (@lancedb/lancedb, keytar) dùng prebuilt N-API
# (ABI ổn định qua Node/Electron) → npmRebuild:false, chỉ unpack .node khỏi asar.
appId: com.insightvault.app
productName: InsightVault
copyright: © 2026 hoanghainh1188

# N-API prebuilt → KHÔNG rebuild (tránh cần Rust/toolchain build lại @lancedb trên CI).
npmRebuild: false

directories:
  output: release
  buildResources: build

# Đưa icon.png vào resources để main set được BrowserWindow/dock icon lúc chạy (ngoài .icns/.ico của bundle).
extraResources:
  - from: build/icon.png
    to: icon.png

# electron-vite xuất ra out/; production deps trong node_modules tự được gộp theo `dependencies`.
files:
  - out/**/*
  - package.json
  # 078 slim-bundle: LOẠI dep LỒNG của @lancedb — bản riêng onnxruntime-node (180M) + onnxruntime-web
  # (94M, WASM trình duyệt) + @huggingface (38M) DÀNH CHO embedding-function nội bộ của lancedb mà app
  # KHÔNG dùng (app tự embed qua @huggingface/transformers TOP-LEVEL rồi đưa vector vào). Đã verify lancedb
  # dist KHÔNG require eager chúng (chỉ lazy `eval(import())` khi gọi embedding-function). ~312M.
  - "!node_modules/@lancedb/lancedb/node_modules/onnxruntime-node/**"
  - "!node_modules/@lancedb/lancedb/node_modules/onnxruntime-web/**"
  - "!node_modules/@lancedb/lancedb/node_modules/@huggingface/**"

# Binary native phải nằm NGOÀI asar để load được lúc chạy.
asarUnpack:
  - "**/*.node"
  - node_modules/@lancedb/**
  - node_modules/keytar/**
  # 051: binary ffmpeg (tách audio khỏi video) phải ngoài asar mới chạy được (spawn). Mỗi runner CI
  # (mac/win) tự cài ffmpeg-static cho nền tảng của nó → artifact có đúng binary.
  - node_modules/ffmpeg-static/**
  # 053: WASM core + worker của tesseract.js (OCR ảnh) phải ngoài asar mới load được.
  - node_modules/tesseract.js/**
  - node_modules/tesseract.js-core/**

mac:
  target:
    - dmg
  category: public.app-category.productivity
  icon: build/icon.icns
  # v0.1: KHÔNG ký (unsigned) — người dùng mở lần đầu qua chuột phải → Open.
  identity: null
  artifactName: ${productName}-${version}-${arch}.${ext}
  # 078: bản mac chỉ cần binary onnxruntime-node cho darwin → LOẠI win32+linux (~176M). Merge với `files` chung.
  files:
    - "!node_modules/onnxruntime-node/bin/napi-v6/win32/**"
    - "!node_modules/onnxruntime-node/bin/napi-v6/linux/**"

dmg:
  writeUpdateInfo: false

win:
  target:
    - nsis
  # electron-builder tự sinh .ico từ PNG 1024 khi build (không cần ImageMagick trên runner).
  icon: build/icon.png
  artifactName: ${productName}-${version}-Setup.${ext}
  # 078: bản win chỉ cần binary onnxruntime-node cho win32 → LOẠI darwin+linux (~87M). Merge với `files` chung.
  files:
    - "!node_modules/onnxruntime-node/bin/napi-v6/darwin/**"
    - "!node_modules/onnxruntime-node/bin/napi-v6/linux/**"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
